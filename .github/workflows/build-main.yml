# Verifies production build on every push to main (catches broken deploys early).
# Vercel still performs the actual deploy when the Git integration is connected.
name: Build main

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Dependency audit (high or critical fails)
        run: npm audit --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:run

      - name: Production build
        run: npm run build
        env:
          # Vite reads GITHUB_SHA in vite.config.ts for __APP_BUILD_ID__
          GITHUB_SHA: ${{ github.sha }}
          # Production client throws without these (see src/integrations/supabase/client.ts).
          # Placeholder project — bundle only; no live Supabase calls in this step.
          VITE_SUPABASE_URL: https://ci-placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNpLXBsYWNlaG9sZGVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE2MDAwMDAwMDAsImV4cCI6MTkwMDAwMDAwMH0.ci-build-placeholder-not-a-real-key
