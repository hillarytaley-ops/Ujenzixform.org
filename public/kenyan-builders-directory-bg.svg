<svg width="1920" height="600" viewBox="0 0 1920 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="buildersSky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="buildingGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1f2937;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#374151;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="craneGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#dc2626;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b91c1c;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Sky background -->
  <rect width="1920" height="600" fill="url(#buildersSky)"/>
  
  <!-- Professional construction skyline -->
  <g transform="translate(0, 0)">
    <!-- Modern office buildings -->
    <rect x="100" y="200" width="120" height="400" fill="url(#buildingGrad)"/>
    <rect x="240" y="150" width="140" height="450" fill="url(#buildingGrad)"/>
    <rect x="400" y="120" width="160" height="480" fill="url(#buildingGrad)"/>
    <rect x="580" y="180" width="130" height="420" fill="url(#buildingGrad)"/>
    <rect x="730" y="100" width="150" height="500" fill="url(#buildingGrad)"/>
    <rect x="900" y="160" width="140" height="440" fill="url(#buildingGrad)"/>
    <rect x="1060" y="140" width="160" height="460" fill="url(#buildingGrad)"/>
    <rect x="1240" y="200" width="130" height="400" fill="url(#buildingGrad)"/>
    <rect x="1390" y="170" width="150" height="430" fill="url(#buildingGrad)"/>
    <rect x="1560" y="220" width="120" height="380" fill="url(#buildingGrad)"/>
    <rect x="1700" y="180" width="140" height="420" fill="url(#buildingGrad)"/>
    
    <!-- Windows pattern for realism -->
    <g fill="#60a5fa" opacity="0.7">
      <!-- Building 1 -->
      <rect x="115" y="220" width="12" height="15"/>
      <rect x="135" y="220" width="12" height="15"/>
      <rect x="155" y="220" width="12" height="15"/>
      <rect x="175" y="220" width="12" height="15"/>
      <rect x="195" y="220" width="12" height="15"/>
      
      <!-- Building 2 -->
      <rect x="255" y="170" width="15" height="18"/>
      <rect x="280" y="170" width="15" height="18"/>
      <rect x="305" y="170" width="15" height="18"/>
      <rect x="330" y="170" width="15" height="18"/>
      <rect x="355" y="170" width="15" height="18"/>
      
      <!-- Building 3 -->
      <rect x="420" y="140" width="18" height="20"/>
      <rect x="450" y="140" width="18" height="20"/>
      <rect x="480" y="140" width="18" height="20"/>
      <rect x="510" y="140" width="18" height="20"/>
      <rect x="540" y="140" width="18" height="20"/>
    </g>
  </g>
  
  <!-- Construction cranes showing active development -->
  <g transform="translate(500, 50)">
    <rect x="0" y="0" width="18" height="400" fill="url(#craneGrad)"/>
    <rect x="-100" y="60" width="200" height="12" fill="url(#craneGrad)"/>
    <rect x="-60" y="60" width="60" height="12" fill="url(#craneGrad)"/>
    <line x1="80" y1="72" x2="80" y2="200" stroke="#dc2626" stroke-width="3"/>
  </g>
  
  <g transform="translate(1200, 30)">
    <rect x="0" y="0" width="20" height="450" fill="url(#craneGrad)"/>
    <rect x="-120" y="70" width="240" height="15" fill="url(#craneGrad)"/>
    <rect x="-80" y="70" width="80" height="15" fill="url(#craneGrad)"/>
    <line x1="100" y1="85" x2="100" y2="220" stroke="#dc2626" stroke-width="3"/>
  </g>
  
  <!-- Professional workers silhouettes -->
  <g transform="translate(300, 480)">
    <!-- Worker with hard hat -->
    <circle cx="15" cy="15" r="8" fill="#1f2937"/>
    <rect x="10" y="23" width="10" height="25" fill="#3b82f6"/>
    <rect x="7" y="48" width="6" height="18" fill="#1f2937"/>
    <rect x="17" y="48" width="6" height="18" fill="#1f2937"/>
    
    <!-- Worker with blueprints -->
    <g transform="translate(50, 0)">
      <circle cx="15" cy="12" r="7" fill="#1f2937"/>
      <rect x="11" y="19" width="8" height="22" fill="#06b6d4"/>
      <rect x="8" y="41" width="5" height="16" fill="#1f2937"/>
      <rect x="17" y="41" width="5" height="16" fill="#1f2937"/>
      <rect x="25" y="25" width="15" height="10" fill="#f3f4f6" opacity="0.8"/>
    </g>
    
    <!-- Supervisor -->
    <g transform="translate(100, 0)">
      <circle cx="12" cy="10" r="6" fill="#1f2937"/>
      <rect x="9" y="16" width="6" height="20" fill="#f59e0b"/>
      <rect x="7" y="36" width="4" height="14" fill="#1f2937"/>
      <rect x="13" y="36" width="4" height="14" fill="#1f2937"/>
    </g>
  </g>
  
  <!-- Kenyan flag accent -->
  <rect x="0" y="0" width="1920" height="8" fill="#000000" opacity="0.4"/>
  <rect x="0" y="8" width="1920" height="8" fill="#dc2626" opacity="0.4"/>
  <rect x="0" y="16" width="1920" height="8" fill="#16a34a" opacity="0.4"/>
  <rect x="0" y="24" width="1920" height="8" fill="#ffffff" opacity="0.4"/>
  
  <!-- Professional overlay -->
  <rect width="1920" height="600" fill="rgba(30, 64, 175, 0.1)"/>
</svg>
















