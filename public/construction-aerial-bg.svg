<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="concrete" patternUnits="userSpaceOnUse" width="40" height="40">
      <rect width="40" height="40" fill="#e5e7eb"/>
      <rect x="0" y="0" width="20" height="20" fill="#f3f4f6"/>
      <rect x="20" y="20" width="20" height="20" fill="#f3f4f6"/>
    </pattern>
    <pattern id="dirt" patternUnits="userSpaceOnUse" width="30" height="30">
      <rect width="30" height="30" fill="#92400e"/>
      <circle cx="5" cy="5" r="2" fill="#a16207"/>
      <circle cx="20" cy="15" r="1.5" fill="#a16207"/>
      <circle cx="10" cy="25" r="1" fill="#a16207"/>
    </pattern>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87ceeb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0f6ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Sky background -->
  <rect width="1920" height="400" fill="url(#skyGradient)"/>
  
  <!-- Ground/Construction site -->
  <rect y="400" width="1920" height="680" fill="url(#dirt)"/>
  
  <!-- Buildings under construction -->
  <g id="buildings">
    <!-- Building 1 -->
    <rect x="200" y="300" width="150" height="300" fill="#d1d5db" stroke="#9ca3af" stroke-width="2"/>
    <rect x="210" y="310" width="20" height="30" fill="#374151"/>
    <rect x="240" y="310" width="20" height="30" fill="#374151"/>
    <rect x="270" y="310" width="20" height="30" fill="#374151"/>
    <rect x="300" y="310" width="20" height="30" fill="#374151"/>
    <rect x="330" y="310" width="20" height="30" fill="#374151"/>
    
    <!-- Building 2 -->
    <rect x="500" y="250" width="200" height="350" fill="#e5e7eb" stroke="#9ca3af" stroke-width="2"/>
    <rect x="520" y="270" width="25" height="35" fill="#374151"/>
    <rect x="560" y="270" width="25" height="35" fill="#374151"/>
    <rect x="600" y="270" width="25" height="35" fill="#374151"/>
    <rect x="640" y="270" width="25" height="35" fill="#374151"/>
    <rect x="680" y="270" width="25" height="35" fill="#374151"/>
    
    <!-- Building 3 -->
    <rect x="800" y="320" width="120" height="280" fill="#f3f4f6" stroke="#9ca3af" stroke-width="2"/>
    <rect x="815" y="340" width="18" height="25" fill="#374151"/>
    <rect x="845" y="340" width="18" height="25" fill="#374151"/>
    <rect x="875" y="340" width="18" height="25" fill="#374151"/>
  </g>
  
  <!-- Construction cranes -->
  <g id="cranes">
    <!-- Crane 1 -->
    <line x1="400" y1="150" x2="400" y2="600" stroke="#f97316" stroke-width="8"/>
    <line x1="300" y1="180" x2="500" y2="180" stroke="#f97316" stroke-width="6"/>
    <line x1="380" y1="180" x2="420" y2="150" stroke="#f97316" stroke-width="4"/>
    <rect x="395" y="145" width="10" height="10" fill="#dc2626"/>
    
    <!-- Crane 2 -->
    <line x1="1200" y1="100" x2="1200" y2="600" stroke="#f97316" stroke-width="8"/>
    <line x1="1050" y1="130" x2="1350" y2="130" stroke="#f97316" stroke-width="6"/>
    <line x1="1180" y1="130" x2="1220" y2="100" stroke="#f97316" stroke-width="4"/>
    <rect x="1195" y="95" width="10" height="10" fill="#dc2626"/>
  </g>
  
  <!-- Construction vehicles -->
  <g id="vehicles">
    <!-- Excavator -->
    <rect x="1000" y="550" width="60" height="30" fill="#fbbf24" rx="5"/>
    <rect x="1020" y="530" width="20" height="20" fill="#f59e0b"/>
    <line x1="1040" y1="530" x2="1080" y2="510" stroke="#374151" stroke-width="4"/>
    <circle cx="1010" cy="590" r="12" fill="#1f2937"/>
    <circle cx="1050" cy="590" r="12" fill="#1f2937"/>
    
    <!-- Dump truck -->
    <rect x="600" y="650" width="80" height="25" fill="#ef4444" rx="3"/>
    <rect x="620" y="640" width="25" height="15" fill="#dc2626"/>
    <circle cx="615" cy="685" r="10" fill="#1f2937"/>
    <circle cx="665" cy="685" r="10" fill="#1f2937"/>
    
    <!-- Cement mixer -->
    <rect x="300" y="700" width="70" height="20" fill="#10b981" rx="3"/>
    <circle cx="335" cy="690" r="15" fill="#059669"/>
    <circle cx="315" cy="730" r="8" fill="#1f2937"/>
    <circle cx="355" cy="730" r="8" fill="#1f2937"/>
  </g>
  
  <!-- Construction materials -->
  <g id="materials">
    <!-- Steel beams -->
    <rect x="100" y="650" width="80" height="8" fill="#6b7280"/>
    <rect x="105" y="658" width="80" height="8" fill="#6b7280"/>
    <rect x="110" y="666" width="80" height="8" fill="#6b7280"/>
    
    <!-- Concrete blocks -->
    <rect x="1400" y="620" width="25" height="25" fill="#9ca3af"/>
    <rect x="1430" y="620" width="25" height="25" fill="#9ca3af"/>
    <rect x="1460" y="620" width="25" height="25" fill="#9ca3af"/>
    <rect x="1415" y="595" width="25" height="25" fill="#9ca3af"/>
    <rect x="1445" y="595" width="25" height="25" fill="#9ca3af"/>
    
    <!-- Scaffolding -->
    <g stroke="#6b7280" stroke-width="3" fill="none">
      <line x1="750" y1="320" x2="750" y2="600"/>
      <line x1="770" y1="320" x2="770" y2="600"/>
      <line x1="750" y1="350" x2="770" y2="350"/>
      <line x1="750" y1="400" x2="770" y2="400"/>
      <line x1="750" y1="450" x2="770" y2="450"/>
      <line x1="750" y1="500" x2="770" y2="500"/>
      <line x1="750" y1="550" x2="770" y2="550"/>
    </g>
  </g>
  
  <!-- Drone in the sky -->
  <g id="drone" transform="translate(960,200)">
    <ellipse cx="0" cy="0" rx="15" ry="8" fill="#374151"/>
    <circle cx="-10" cy="-5" r="3" fill="#1f2937"/>
    <circle cx="10" cy="-5" r="3" fill="#1f2937"/>
    <circle cx="-10" cy="5" r="3" fill="#1f2937"/>
    <circle cx="10" cy="5" r="3" fill="#1f2937"/>
    <rect x="-2" y="-2" width="4" height="4" fill="#ef4444"/>
  </g>
  
  <!-- Construction dust/particles -->
  <g id="dust" opacity="0.3">
    <circle cx="450" cy="580" r="2" fill="#a16207"/>
    <circle cx="480" cy="590" r="1.5" fill="#a16207"/>
    <circle cx="520" cy="570" r="1" fill="#a16207"/>
    <circle cx="1100" cy="560" r="2" fill="#a16207"/>
    <circle cx="1130" cy="570" r="1.5" fill="#a16207"/>
  </g>
  
  <!-- Safety barriers -->
  <g id="barriers">
    <rect x="50" y="580" width="100" height="8" fill="#f97316"/>
    <rect x="50" y="590" width="100" height="8" fill="#ffffff"/>
    <rect x="1500" y="580" width="150" height="8" fill="#f97316"/>
    <rect x="1500" y="590" width="150" height="8" fill="#ffffff"/>
  </g>
</svg>








