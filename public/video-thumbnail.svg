<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="videoSky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F7931E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06A77D;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="videoBuilding" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2C3E50;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#34495E;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="450" fill="url(#videoSky)"/>
  
  <!-- Buildings -->
  <rect x="50" y="250" width="80" height="200" fill="url(#videoBuilding)"/>
  <rect x="150" y="200" width="100" height="250" fill="url(#videoBuilding)"/>
  <rect x="270" y="180" width="120" height="270" fill="url(#videoBuilding)"/>
  <rect x="410" y="220" width="90" height="230" fill="url(#videoBuilding)"/>
  <rect x="520" y="190" width="110" height="260" fill="url(#videoBuilding)"/>
  <rect x="650" y="240" width="80" height="210" fill="url(#videoBuilding)"/>
  
  <!-- Construction crane -->
  <g transform="translate(400, 80)">
    <rect x="0" y="0" width="12" height="300" fill="#E74C3C"/>
    <rect x="-80" y="40" width="160" height="8" fill="#E74C3C"/>
    <line x1="60" y1="48" x2="60" y2="150" stroke="#E74C3C" stroke-width="2"/>
  </g>
  
  <!-- UjenziPro Logo Text -->
  <text x="400" y="120" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="36" font-weight="bold" opacity="0.9">
    UjenziPro
  </text>
  <text x="400" y="150" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="16" opacity="0.8">
    Platform Demo
  </text>
  
  <!-- Play button overlay -->
  <circle cx="400" cy="225" r="40" fill="rgba(255,255,255,0.9)"/>
  <polygon points="385,210 385,240 415,225" fill="#2C3E50"/>
  
  <!-- Overlay -->
  <rect width="800" height="450" fill="rgba(0,0,0,0.2)"/>
</svg>


















