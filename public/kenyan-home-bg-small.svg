<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="quickSky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F7931E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06A77D;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="quickBuilding" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2C3E50;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#34495E;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  
  <!-- Sky -->
  <rect width="1920" height="1080" fill="url(#quickSky)"/>
  
  <!-- Simple skyline -->
  <rect x="0" y="600" width="200" height="480" fill="url(#quickBuilding)"/>
  <rect x="220" y="500" width="180" height="580" fill="url(#quickBuilding)"/>
  <rect x="420" y="550" width="160" height="530" fill="url(#quickBuilding)"/>
  <rect x="600" y="450" width="200" height="630" fill="url(#quickBuilding)"/>
  <rect x="1200" y="500" width="160" height="580" fill="url(#quickBuilding)"/>
  <rect x="1440" y="450" width="180" height="630" fill="url(#quickBuilding)"/>
  
  <!-- Simple crane -->
  <g transform="translate(800, 200)">
    <rect x="0" y="0" width="15" height="500" fill="#E74C3C"/>
    <rect x="-100" y="60" width="200" height="10" fill="#E74C3C"/>
  </g>
  
  <!-- Overlay -->
  <rect width="1920" height="1080" fill="rgba(0,0,0,0.3)"/>
</svg>
















