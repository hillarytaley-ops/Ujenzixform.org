<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <!-- Construction Pattern -->
    <pattern id="constructionPattern" patternUnits="userSpaceOnUse" width="120" height="120">
      <rect width="120" height="120" fill="#f8f9fa"/>
      
      <!-- Building blocks pattern -->
      <rect x="0" y="0" width="40" height="20" fill="#e9ecef" opacity="0.3"/>
      <rect x="40" y="20" width="40" height="20" fill="#e9ecef" opacity="0.3"/>
      <rect x="80" y="0" width="40" height="20" fill="#e9ecef" opacity="0.3"/>
      
      <rect x="0" y="40" width="40" height="20" fill="#e9ecef" opacity="0.2"/>
      <rect x="40" y="60" width="40" height="20" fill="#e9ecef" opacity="0.2"/>
      <rect x="80" y="40" width="40" height="20" fill="#e9ecef" opacity="0.2"/>
      
      <rect x="0" y="80" width="40" height="20" fill="#e9ecef" opacity="0.3"/>
      <rect x="40" y="100" width="40" height="20" fill="#e9ecef" opacity="0.3"/>
      <rect x="80" y="80" width="40" height="20" fill="#e9ecef" opacity="0.3"/>
      
      <!-- Construction tools -->
      <circle cx="20" cy="110" r="2" fill="#ff6b35" opacity="0.4"/>
      <circle cx="100" cy="110" r="2" fill="#228b22" opacity="0.4"/>
      
      <!-- Grid lines -->
      <line x1="0" y1="20" x2="120" y2="20" stroke="#dee2e6" stroke-width="0.5" opacity="0.3"/>
      <line x1="0" y1="40" x2="120" y2="40" stroke="#dee2e6" stroke-width="0.5" opacity="0.3"/>
      <line x1="0" y1="60" x2="120" y2="60" stroke="#dee2e6" stroke-width="0.5" opacity="0.3"/>
      <line x1="0" y1="80" x2="120" y2="80" stroke="#dee2e6" stroke-width="0.5" opacity="0.3"/>
      <line x1="0" y1="100" x2="120" y2="100" stroke="#dee2e6" stroke-width="0.5" opacity="0.3"/>
      
      <line x1="40" y1="0" x2="40" y2="120" stroke="#dee2e6" stroke-width="0.5" opacity="0.3"/>
      <line x1="80" y1="0" x2="80" y2="120" stroke="#dee2e6" stroke-width="0.5" opacity="0.3"/>
    </pattern>
    
    <!-- Gradient overlay -->
    <linearGradient id="overlayGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:0.1"/>
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0.05"/>
      <stop offset="100%" style="stop-color:#228b22;stop-opacity:0.1"/>
    </linearGradient>
  </defs>
  
  <!-- Base pattern -->
  <rect width="100%" height="100%" fill="url(#constructionPattern)"/>
  
  <!-- Gradient overlay -->
  <rect width="100%" height="100%" fill="url(#overlayGradient)"/>
  
  <!-- Subtle construction elements -->
  <g opacity="0.1">
    <!-- Crane silhouettes -->
    <g transform="translate(200,100)">
      <rect x="0" y="0" width="4" height="200" fill="#ff6b35"/>
      <rect x="-20" y="20" width="40" height="4" fill="#ff6b35"/>
      <rect x="15" y="24" width="20" height="2" fill="#ff6b35"/>
    </g>
    
    <g transform="translate(800,150)">
      <rect x="0" y="0" width="4" height="180" fill="#228b22"/>
      <rect x="-25" y="30" width="50" height="4" fill="#228b22"/>
      <rect x="20" y="34" width="25" height="2" fill="#228b22"/>
    </g>
    
    <!-- Building outlines -->
    <g transform="translate(400,300)">
      <rect x="0" y="0" width="60" height="100" fill="none" stroke="#ff6b35" stroke-width="2"/>
      <rect x="10" y="20" width="8" height="8" fill="none" stroke="#ff6b35" stroke-width="1"/>
      <rect x="25" y="20" width="8" height="8" fill="none" stroke="#ff6b35" stroke-width="1"/>
      <rect x="42" y="20" width="8" height="8" fill="none" stroke="#ff6b35" stroke-width="1"/>
    </g>
    
    <g transform="translate(600,250)">
      <rect x="0" y="0" width="80" height="120" fill="none" stroke="#228b22" stroke-width="2"/>
      <rect x="15" y="25" width="10" height="10" fill="none" stroke="#228b22" stroke-width="1"/>
      <rect x="35" y="25" width="10" height="10" fill="none" stroke="#228b22" stroke-width="1"/>
      <rect x="55" y="25" width="10" height="10" fill="none" stroke="#228b22" stroke-width="1"/>
    </g>
  </g>
</svg>


















