<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#006633;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="overlayGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.3" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bgGradient)"/>
  <rect width="1920" height="1080" fill="url(#overlayGradient)"/>
  
  <!-- Construction Site Silhouettes -->
  <g opacity="0.3">
    <!-- Building Silhouettes -->
    <rect x="100" y="600" width="80" height="300" fill="#000000" opacity="0.2"/>
    <rect x="200" y="550" width="100" height="350" fill="#000000" opacity="0.2"/>
    <rect x="320" y="580" width="90" height="320" fill="#000000" opacity="0.2"/>
    
    <!-- Crane Silhouette -->
    <g transform="translate(1400, 200)">
      <rect x="0" y="0" width="8" height="600" fill="#000000" opacity="0.3"/>
      <rect x="-100" y="100" width="200" height="6" fill="#000000" opacity="0.3"/>
      <rect x="90" y="106" width="6" height="100" fill="#000000" opacity="0.3"/>
    </g>
  </g>
  
  <!-- UjenziPro Logo -->
  <g transform="translate(150, 80)">
    <!-- Logo Background Circle -->
    <circle cx="60" cy="60" r="50" fill="#FFFFFF" opacity="0.95"/>
    
    <!-- Building Icon -->
    <g transform="translate(30, 30)">
      <rect x="10" y="40" width="15" height="20" fill="#2563eb"/>
      <rect x="30" y="35" width="15" height="25" fill="#006633"/>
      <rect x="50" y="30" width="15" height="30" fill="#FF6B35"/>
      
      <!-- Windows -->
      <rect x="12" y="45" width="3" height="3" fill="#FFFFFF"/>
      <rect x="17" y="45" width="3" height="3" fill="#FFFFFF"/>
      <rect x="12" y="52" width="3" height="3" fill="#FFFFFF"/>
      <rect x="17" y="52" width="3" height="3" fill="#FFFFFF"/>
      
      <rect x="32" y="40" width="3" height="3" fill="#FFFFFF"/>
      <rect x="37" y="40" width="3" height="3" fill="#FFFFFF"/>
      <rect x="32" y="47" width="3" height="3" fill="#FFFFFF"/>
      <rect x="37" y="47" width="3" height="3" fill="#FFFFFF"/>
      
      <rect x="52" y="35" width="3" height="3" fill="#FFFFFF"/>
      <rect x="57" y="35" width="3" height="3" fill="#FFFFFF"/>
      <rect x="52" y="42" width="3" height="3" fill="#FFFFFF"/>
      <rect x="57" y="42" width="3" height="3" fill="#FFFFFF"/>
      <rect x="52" y="49" width="3" height="3" fill="#FFFFFF"/>
      <rect x="57" y="49" width="3" height="3" fill="#FFFFFF"/>
    </g>
    
    <!-- UjenziPro Text -->
    <text x="140" y="45" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#FFFFFF">UjenziPro</text>
    <text x="140" y="75" font-family="Arial, sans-serif" font-size="16" fill="#FFD700">Kujenga Pamoja</text>
  </g>
  
  <!-- Main Title -->
  <g transform="translate(960, 400)">
    <text x="0" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="#FFFFFF">
      Platform Demo Video
    </text>
    <text x="0" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" fill="#FFD700">
      Kenya's Premier Construction Marketplace
    </text>
  </g>
  
  <!-- Play Button -->
  <g transform="translate(960, 540)">
    <!-- Play Button Background -->
    <circle cx="0" cy="0" r="80" fill="#FFFFFF" opacity="0.95"/>
    <circle cx="0" cy="0" r="70" fill="#2563eb"/>
    
    <!-- Play Triangle -->
    <polygon points="-20,0 20,-25 20,25" fill="#FFFFFF"/>
  </g>
  
  <!-- Duration Badge -->
  <g transform="translate(1720, 980)">
    <rect x="-60" y="-20" width="120" height="40" rx="20" fill="#000000" opacity="0.8"/>
    <text x="0" y="8" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">3:45</text>
  </g>
  
  <!-- Statistics -->
  <g transform="translate(960, 750)">
    <g transform="translate(-300, 0)">
      <rect x="-80" y="-40" width="160" height="80" rx="10" fill="#000000" opacity="0.6"/>
      <text x="0" y="-10" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2563eb">2,500+</text>
      <text x="0" y="15" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">Builders</text>
    </g>
    
    <g transform="translate(0, 0)">
      <rect x="-80" y="-40" width="160" height="80" rx="10" fill="#000000" opacity="0.6"/>
      <text x="0" y="-10" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#006633">850+</text>
      <text x="0" y="15" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">Suppliers</text>
    </g>
    
    <g transform="translate(300, 0)">
      <rect x="-80" y="-40" width="160" height="80" rx="10" fill="#000000" opacity="0.6"/>
      <text x="0" y="-10" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#FF6B35">25,000+</text>
      <text x="0" y="15" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">Projects</text>
    </g>
  </g>
  
  <!-- Kenyan Flag Element -->
  <g transform="translate(1720, 100)">
    <rect x="0" y="0" width="120" height="80" fill="#000000"/>
    <rect x="0" y="20" width="120" height="20" fill="#FFFFFF"/>
    <rect x="0" y="40" width="120" height="20" fill="#006633"/>
    <rect x="0" y="60" width="120" height="20" fill="#FFFFFF"/>
    
    <!-- Shield in center -->
    <g transform="translate(60, 40)">
      <ellipse cx="0" cy="0" rx="15" ry="20" fill="#8B4513"/>
      <rect x="-2" y="-15" width="4" height="30" fill="#FFFFFF"/>
      <rect x="-10" y="-2" width="20" height="4" fill="#FFFFFF"/>
    </g>
  </g>
  
  <!-- Bottom Text -->
  <g transform="translate(960, 950)">
    <text x="0" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#FFFFFF">
      See how easy it is to connect, quote, and build across Kenya
    </text>
    <text x="0" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#FFD700">
      From Nairobi to Mombasa • Kisumu to Eldoret • All 47 Counties
    </text>
  </g>
</svg>










