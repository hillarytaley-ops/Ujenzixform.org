<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Sky gradient -->
  <defs>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#98FB98;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#228B22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="houseGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8B4513;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#A0522D;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="roofGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#DC143C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B22222;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Sky background -->
  <rect width="1920" height="1080" fill="url(#skyGradient)"/>
  
  <!-- Rolling hills background -->
  <path d="M0,800 Q480,700 960,750 T1920,800 L1920,1080 L0,1080 Z" fill="#2E8B57" opacity="0.7"/>
  <path d="M0,850 Q320,750 640,800 T1280,820 Q1600,800 1920,850 L1920,1080 L0,1080 Z" fill="#228B22" opacity="0.8"/>
  
  <!-- Traditional Kenyan houses -->
  <g transform="translate(200, 600)">
    <!-- House 1 -->
    <rect x="0" y="100" width="120" height="100" fill="url(#houseGradient)"/>
    <polygon points="0,100 60,50 120,100" fill="url(#roofGradient)"/>
    <rect x="20" y="130" width="25" height="40" fill="#654321"/>
    <rect x="75" y="130" width="20" height="20" fill="#87CEEB"/>
  </g>
  
  <g transform="translate(400, 650)">
    <!-- House 2 -->
    <rect x="0" y="80" width="100" height="90" fill="url(#houseGradient)"/>
    <polygon points="0,80 50,30 100,80" fill="url(#roofGradient)"/>
    <rect x="15" y="110" width="20" height="35" fill="#654321"/>
    <rect x="65" y="110" width="15" height="15" fill="#87CEEB"/>
  </g>
  
  <g transform="translate(600, 620)">
    <!-- House 3 - Under construction -->
    <rect x="0" y="90" width="130" height="110" fill="url(#houseGradient)"/>
    <polygon points="0,90 65,40 130,90" fill="url(#roofGradient)" opacity="0.7"/>
    <rect x="25" y="120" width="30" height="45" fill="#654321"/>
    <!-- Construction materials -->
    <rect x="140" y="150" width="30" height="20" fill="#8B4513"/>
    <rect x="140" y="130" width="25" height="15" fill="#CD853F"/>
  </g>
  
  <g transform="translate(800, 580)">
    <!-- Modern house -->
    <rect x="0" y="120" width="150" height="120" fill="url(#houseGradient)"/>
    <polygon points="0,120 75,60 150,120" fill="url(#roofGradient)"/>
    <rect x="30" y="160" width="30" height="50" fill="#654321"/>
    <rect x="90" y="160" width="25" height="25" fill="#87CEEB"/>
    <rect x="120" y="180" width="20" height="20" fill="#87CEEB"/>
  </g>
  
  <!-- Construction tools and materials -->
  <g transform="translate(1200, 700)">
    <!-- Wheelbarrow -->
    <ellipse cx="20" cy="30" rx="15" ry="8" fill="#696969"/>
    <rect x="5" y="15" width="30" height="15" fill="#8B4513"/>
    <line x1="35" y1="22" x2="50" y2="10" stroke="#654321" stroke-width="3"/>
    
    <!-- Cement bags -->
    <rect x="60" y="20" width="25" height="35" fill="#D3D3D3"/>
    <rect x="90" y="25" width="25" height="30" fill="#D3D3D3"/>
    <rect x="75" y="15" width="25" height="35" fill="#C0C0C0"/>
  </g>
  
  <!-- Acacia trees (typical Kenyan landscape) -->
  <g transform="translate(1400, 500)">
    <!-- Tree trunk -->
    <rect x="15" y="150" width="10" height="80" fill="#8B4513"/>
    <!-- Tree canopy -->
    <ellipse cx="20" cy="130" rx="40" ry="25" fill="#228B22" opacity="0.8"/>
  </g>
  
  <g transform="translate(1600, 520)">
    <rect x="12" y="140" width="8" height="70" fill="#8B4513"/>
    <ellipse cx="16" cy="125" rx="35" ry="20" fill="#32CD32" opacity="0.7"/>
  </g>
  
  <!-- Workers silhouettes -->
  <g transform="translate(500, 720)">
    <!-- Worker 1 -->
    <circle cx="10" cy="10" r="5" fill="#2F4F4F"/>
    <rect x="7" y="15" width="6" height="15" fill="#2F4F4F"/>
    <rect x="5" y="30" width="4" height="12" fill="#2F4F4F"/>
    <rect x="11" y="30" width="4" height="12" fill="#2F4F4F"/>
    
    <!-- Worker 2 -->
    <circle cx="30" cy="8" r="4" fill="#2F4F4F"/>
    <rect x="28" y="12" width="5" height="12" fill="#2F4F4F"/>
    <rect x="26" y="24" width="3" height="10" fill="#2F4F4F"/>
    <rect x="31" y="24" width="3" height="10" fill="#2F4F4F"/>
  </g>
  
  <!-- Kenyan flag colors accent -->
  <rect x="0" y="0" width="1920" height="15" fill="#000000"/>
  <rect x="0" y="15" width="1920" height="15" fill="#FF0000"/>
  <rect x="0" y="30" width="1920" height="15" fill="#00FF00"/>
  <rect x="0" y="45" width="1920" height="15" fill="#FFFFFF"/>
  
  <!-- Overlay for text readability -->
  <rect width="1920" height="1080" fill="rgba(0,0,0,0.2)"/>
</svg>
















