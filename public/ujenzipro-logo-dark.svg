<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80" width="300" height="80">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="backgroundGradientDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#357ABD;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E6DA4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Dark background -->
  <rect width="300" height="80" fill="#1a202c" rx="8"/>
  
  <!-- Logo circle -->
  <circle cx="150" cy="40" r="30" fill="url(#backgroundGradientDark)" stroke="#5BA0F2" stroke-width="2"/>
  
  <!-- UjenziPro Text - Centered -->
  <text x="150" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">
    UjenziPro
  </text>
</svg>

