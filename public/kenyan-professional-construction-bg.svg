<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Sky gradient -->
  <defs>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4682B4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="buildingGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2C3E50;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#34495E;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="craneGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E74C3C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C0392B;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Sky background -->
  <rect width="1920" height="1080" fill="url(#skyGradient)"/>
  
  <!-- Nairobi skyline silhouette -->
  <rect x="0" y="600" width="200" height="480" fill="url(#buildingGradient)"/>
  <rect x="220" y="500" width="180" height="580" fill="url(#buildingGradient)"/>
  <rect x="420" y="550" width="160" height="530" fill="url(#buildingGradient)"/>
  <rect x="600" y="450" width="200" height="630" fill="url(#buildingGradient)"/>
  <rect x="820" y="400" width="180" height="680" fill="url(#buildingGradient)"/>
  <rect x="1020" y="350" width="220" height="730" fill="url(#buildingGradient)"/>
  <rect x="1260" y="500" width="160" height="580" fill="url(#buildingGradient)"/>
  <rect x="1440" y="450" width="180" height="630" fill="url(#buildingGradient)"/>
  <rect x="1640" y="550" width="160" height="530" fill="url(#buildingGradient)"/>
  <rect x="1820" y="600" width="100" height="480" fill="url(#buildingGradient)"/>
  
  <!-- Construction crane -->
  <g transform="translate(1100, 200)">
    <!-- Crane tower -->
    <rect x="0" y="0" width="20" height="600" fill="url(#craneGradient)"/>
    <!-- Crane jib -->
    <rect x="-150" y="80" width="300" height="15" fill="url(#craneGradient)"/>
    <!-- Crane counter-jib -->
    <rect x="-80" y="80" width="80" height="15" fill="url(#craneGradient)"/>
    <!-- Crane hook line -->
    <line x1="100" y1="95" x2="100" y2="300" stroke="#E74C3C" stroke-width="3"/>
  </g>
  
  <!-- Additional crane -->
  <g transform="translate(600, 250)">
    <rect x="0" y="0" width="18" height="500" fill="url(#craneGradient)"/>
    <rect x="-120" y="70" width="250" height="12" fill="url(#craneGradient)"/>
    <rect x="-60" y="70" width="60" height="12" fill="url(#craneGradient)"/>
    <line x1="80" y1="82" x2="80" y2="250" stroke="#E74C3C" stroke-width="2"/>
  </g>
  
  <!-- Building under construction -->
  <g transform="translate(800, 400)">
    <!-- Building frame -->
    <rect x="0" y="0" width="200" height="400" fill="none" stroke="#34495E" stroke-width="4"/>
    <!-- Floors -->
    <line x1="0" y1="80" x2="200" y2="80" stroke="#34495E" stroke-width="2"/>
    <line x1="0" y1="160" x2="200" y2="160" stroke="#34495E" stroke-width="2"/>
    <line x1="0" y1="240" x2="200" y2="240" stroke="#34495E" stroke-width="2"/>
    <line x1="0" y1="320" x2="200" y2="320" stroke="#34495E" stroke-width="2"/>
    <!-- Vertical supports -->
    <line x1="50" y1="0" x2="50" y2="400" stroke="#34495E" stroke-width="2"/>
    <line x1="100" y1="0" x2="100" y2="400" stroke="#34495E" stroke-width="2"/>
    <line x1="150" y1="0" x2="150" y2="400" stroke="#34495E" stroke-width="2"/>
  </g>
  
  <!-- Kenyan flag colors accent -->
  <rect x="0" y="0" width="1920" height="20" fill="#000000"/>
  <rect x="0" y="20" width="1920" height="20" fill="#FF0000"/>
  <rect x="0" y="40" width="1920" height="20" fill="#00FF00"/>
  <rect x="0" y="60" width="1920" height="20" fill="#FFFFFF"/>
  
  <!-- Overlay for text readability -->
  <rect width="1920" height="1080" fill="rgba(0,0,0,0.3)"/>
</svg>














