<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Sky gradient -->
  <defs>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFA500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6347;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="buildingGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2C3E50;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#34495E;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="houseGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8B4513;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#A0522D;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  
  <!-- Sky background -->
  <rect width="1920" height="1080" fill="url(#skyGradient)"/>
  
  <!-- Left side - Professional construction (modern buildings) -->
  <g transform="translate(0, 0)">
    <!-- Modern skyscrapers -->
    <rect x="50" y="400" width="120" height="680" fill="url(#buildingGradient)"/>
    <rect x="190" y="350" width="140" height="730" fill="url(#buildingGradient)"/>
    <rect x="350" y="300" width="160" height="780" fill="url(#buildingGradient)"/>
    <rect x="530" y="450" width="130" height="630" fill="url(#buildingGradient)"/>
    
    <!-- Windows pattern -->
    <g fill="#87CEEB" opacity="0.7">
      <!-- Building 1 windows -->
      <rect x="70" y="420" width="15" height="20"/>
      <rect x="100" y="420" width="15" height="20"/>
      <rect x="130" y="420" width="15" height="20"/>
      <rect x="70" y="460" width="15" height="20"/>
      <rect x="100" y="460" width="15" height="20"/>
      <rect x="130" y="460" width="15" height="20"/>
      
      <!-- Building 2 windows -->
      <rect x="210" y="380" width="18" height="25"/>
      <rect x="240" y="380" width="18" height="25"/>
      <rect x="270" y="380" width="18" height="25"/>
      <rect x="300" y="380" width="18" height="25"/>
    </g>
    
    <!-- Construction crane -->
    <g transform="translate(400, 150)">
      <rect x="0" y="0" width="15" height="500" fill="#E74C3C"/>
      <rect x="-100" y="60" width="200" height="10" fill="#E74C3C"/>
      <line x1="70" y1="70" x2="70" y2="200" stroke="#E74C3C" stroke-width="2"/>
    </g>
  </g>
  
  <!-- Right side - Private construction (residential houses) -->
  <g transform="translate(1000, 0)">
    <!-- Rolling hills -->
    <path d="M0,600 Q200,500 400,550 T800,600 L800,1080 L0,1080 Z" fill="#228B22" opacity="0.6"/>
    
    <!-- Traditional and modern houses -->
    <g transform="translate(100, 500)">
      <rect x="0" y="100" width="100" height="80" fill="url(#houseGradient)"/>
      <polygon points="0,100 50,60 100,100" fill="#DC143C"/>
      <rect x="20" y="120" width="20" height="30" fill="#654321"/>
      <rect x="60" y="120" width="15" height="15" fill="#87CEEB"/>
    </g>
    
    <g transform="translate(250, 520)">
      <rect x="0" y="90" width="120" height="100" fill="url(#houseGradient)"/>
      <polygon points="0,90 60,50 120,90" fill="#DC143C"/>
      <rect x="25" y="120" width="25" height="40" fill="#654321"/>
      <rect x="70" y="120" width="20" height="20" fill="#87CEEB"/>
    </g>
    
    <g transform="translate(400, 480)">
      <rect x="0" y="120" width="140" height="120" fill="url(#houseGradient)"/>
      <polygon points="0,120 70,70 140,120" fill="#DC143C"/>
      <rect x="30" y="160" width="30" height="50" fill="#654321"/>
      <rect x="80" y="160" width="25" height="25" fill="#87CEEB"/>
    </g>
    
    <!-- Acacia trees -->
    <g transform="translate(600, 400)">
      <rect x="15" y="150" width="8" height="60" fill="#8B4513"/>
      <ellipse cx="19" cy="135" rx="30" ry="20" fill="#228B22" opacity="0.8"/>
    </g>
  </g>
  
  <!-- Central dividing element -->
  <rect x="950" y="200" width="20" height="600" fill="rgba(255,255,255,0.3)"/>
  
  <!-- Kenyan landscape elements -->
  <!-- Mount Kenya silhouette in background -->
  <path d="M800,400 L900,200 L1000,250 L1100,180 L1200,300 L1300,400 L800,400" fill="#4682B4" opacity="0.3"/>
  
  <!-- Kenyan flag colors accent -->
  <rect x="0" y="0" width="1920" height="12" fill="#000000"/>
  <rect x="0" y="12" width="1920" height="12" fill="#FF0000"/>
  <rect x="0" y="24" width="1920" height="12" fill="#00FF00"/>
  <rect x="0" y="36" width="1920" height="12" fill="#FFFFFF"/>
  
  <!-- Overlay for text readability -->
  <rect width="1920" height="1080" fill="rgba(0,0,0,0.25)"/>
</svg>














