<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#228b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f0f0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="50" cy="50" r="48" fill="url(#logoGradient)" stroke="#ffffff" stroke-width="2"/>
  
  <!-- Construction Icon -->
  <g transform="translate(50,50)">
    <!-- Building/Tower -->
    <rect x="-8" y="-15" width="16" height="20" fill="url(#textGradient)" rx="1"/>
    <rect x="-6" y="-13" width="3" height="3" fill="#ff6b35" opacity="0.8"/>
    <rect x="3" y="-13" width="3" height="3" fill="#ff6b35" opacity="0.8"/>
    <rect x="-6" y="-8" width="3" height="3" fill="#ff6b35" opacity="0.8"/>
    <rect x="3" y="-8" width="3" height="3" fill="#ff6b35" opacity="0.8"/>
    <rect x="-6" y="-3" width="3" height="3" fill="#ff6b35" opacity="0.8"/>
    <rect x="3" y="-3" width="3" height="3" fill="#ff6b35" opacity="0.8"/>
    
    <!-- Foundation -->
    <rect x="-12" y="5" width="24" height="4" fill="url(#textGradient)" rx="1"/>
    
    <!-- Construction Tools -->
    <circle cx="-15" cy="15" r="3" fill="#228b22"/>
    <rect x="-17" y="12" width="4" height="1" fill="#ffffff"/>
    
    <circle cx="15" cy="15" r="3" fill="#228b22"/>
    <rect x="13" y="12" width="4" height="1" fill="#ffffff"/>
  </g>
  
  <!-- Company Initials -->
  <text x="50" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">UP</text>
</svg>















