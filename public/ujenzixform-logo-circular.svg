<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Definitions -->
  <defs>
    <!-- Circular clip path for the logo image -->
    <clipPath id="circleClip">
      <circle cx="60" cy="60" r="52"/>
    </clipPath>
    
    <!-- Kenyan Flag Gradient for outer ring -->
    <linearGradient id="flagGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:1" />
      <stop offset="25%" style="stop-color:#BB0A1E;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#006600;stop-opacity:1" />
      <stop offset="75%" style="stop-color:#BB0A1E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
    </linearGradient>
    
    <!-- Border Gradient -->
    <linearGradient id="borderGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#006600;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FCD116;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#BB0A1E;stop-opacity:1" />
    </linearGradient>
    
    <!-- Building gradient -->
    <linearGradient id="buildingGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A5F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F2C59;stop-opacity:1" />
    </linearGradient>
    
    <!-- Orange gradient for helmet and accents -->
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EA580C;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Outer Kenyan Flag Colors Ring -->
  <circle cx="60" cy="60" r="59" fill="none" stroke="url(#flagGradient)" stroke-width="3"/>
  
  <!-- Inner border -->
  <circle cx="60" cy="60" r="55" fill="none" stroke="url(#borderGradient)" stroke-width="2"/>
  
  <!-- White background circle -->
  <circle cx="60" cy="60" r="52" fill="#FAFAFA"/>
  
  <!-- Logo Content Group - Clipped to circle -->
  <g clip-path="url(#circleClip)">
    <!-- House (left) - Light blue -->
    <path d="M25 70 L25 55 L38 42 L51 55 L51 70 Z" fill="#5B9BD5"/>
    <rect x="33" y="58" width="10" height="12" fill="#1E3A5F"/>
    
    <!-- Tall building (center-left) - Dark blue -->
    <rect x="42" y="35" width="12" height="35" fill="url(#buildingGradient)"/>
    <rect x="45" y="38" width="3" height="5" fill="#5B9BD5"/>
    <rect x="45" y="46" width="3" height="5" fill="#5B9BD5"/>
    <rect x="45" y="54" width="3" height="5" fill="#5B9BD5"/>
    <rect x="45" y="62" width="3" height="5" fill="#5B9BD5"/>
    
    <!-- Building (center-right) - Orange -->
    <rect x="56" y="40" width="14" height="30" fill="url(#orangeGradient)"/>
    <rect x="59" y="43" width="3" height="4" fill="#FAFAFA"/>
    <rect x="65" y="43" width="3" height="4" fill="#FAFAFA"/>
    <rect x="59" y="50" width="3" height="4" fill="#FAFAFA"/>
    <rect x="65" y="50" width="3" height="4" fill="#FAFAFA"/>
    <rect x="59" y="57" width="3" height="4" fill="#FAFAFA"/>
    <rect x="65" y="57" width="3" height="4" fill="#FAFAFA"/>
    
    <!-- Construction Helmet (top right) - Orange -->
    <ellipse cx="78" cy="42" rx="14" ry="8" fill="url(#orangeGradient)"/>
    <rect x="64" y="42" width="28" height="3" fill="#EA580C"/>
    
    <!-- Delivery Truck (bottom) - Dark blue with orange -->
    <rect x="40" y="72" width="35" height="18" rx="2" fill="url(#buildingGradient)"/>
    <rect x="75" y="78" width="12" height="12" rx="1" fill="url(#orangeGradient)"/>
    <!-- Truck wheels -->
    <circle cx="50" cy="92" r="5" fill="#1E3A5F"/>
    <circle cx="50" cy="92" r="2" fill="#FAFAFA"/>
    <circle cx="72" cy="92" r="5" fill="#1E3A5F"/>
    <circle cx="72" cy="92" r="2" fill="#FAFAFA"/>
    <!-- Speed lines -->
    <line x1="30" y1="78" x2="38" y2="78" stroke="#1E3A5F" stroke-width="2"/>
    <line x1="28" y1="82" x2="38" y2="82" stroke="#1E3A5F" stroke-width="2"/>
    <line x1="32" y1="86" x2="38" y2="86" stroke="#1E3A5F" stroke-width="2"/>
  </g>
</svg>