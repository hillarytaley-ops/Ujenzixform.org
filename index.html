    <!-- AGGRESSIVE CACHE BUSTER v29 -->
    <script>
      (function() {
        var BUILD = 'v96-qr-datetime-visual-separation';
        var KEY = 'ujenzi_build';
        var last = localStorage.getItem(KEY);
        
        // Always unregister service workers
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(regs) {
            regs.forEach(function(r) { r.unregister(); });
          });
        }
        
        // Clear caches
        if ('caches' in window) {
          caches.keys().then(function(names) {
            names.forEach(function(n) { caches.delete(n); });
          });
        }
        
        // Force reload if build changed
        if (last !== BUILD) {
          localStorage.setItem(KEY, BUILD);
          if (last) {
            // Add cache-busting parameter and reload
            var url = new URL(window.location.href);
            url.searchParams.set('_cb', Date.now());
            window.location.replace(url.toString());
          }
        }
        
        console.log('🚀 UjenziXform BUILD:', BUILD);
      })();
    </script>
