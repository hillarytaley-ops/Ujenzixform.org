# =============================================================================
# UjenziXform — MediaMTX for RTSP → HLS (browser / hls.js friendly)
# =============================================================================
# Do NOT paste the entire upstream default mediamtx.yml unless you merge paths
# correctly. Missing or wrong `paths:` is the #1 reason /cam1/… 404s.
#
# Playlist URL shape: http://<host>:8888/<PATH_NAME>/index.m3u8
# This file defines PATH_NAME = cam1 → …/cam1/index.m3u8
#
# 1) Replace the RTSP URL (VLC → Open Network Stream first).
# 2) Special characters in password → URL-encode (e.g. @ → %40).
# 3) Production app is HTTPS → use ngrok/Caddy with https://…m3u8 (see README).
# =============================================================================

logLevel: info

# HLS: prefer MPEG-TS segments for maximum compatibility with hls.js + Edge/Chrome.
# (lowLatency / fmp4 can fail on some cameras or players.)
hls: true
hlsAddress: :8888
hlsEncryption: false
hlsAllowOrigins: ['*']
hlsVariant: mpegts
hlsSegmentCount: 7
hlsSegmentDuration: 2s
hlsAlwaysRemux: false

# Pull from camera over TCP (more reliable through Docker NAT / firewalls than UDP).
pathDefaults:
  rtspTransport: tcp

paths:
  cam1:
    source: rtsp://USER:PASSWORD@192.168.0.103:554/Streaming/Channels/101
    # Start RTSP only when someone opens HLS (saves camera bandwidth).
    sourceOnDemand: yes
    sourceOnDemandStartTimeout: 20s
    sourceOnDemandCloseAfter: 30s
